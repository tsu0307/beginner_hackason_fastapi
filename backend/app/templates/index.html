{% extends "base.html" %}

{% block content %}
<main class="page">
  <section id="app-shell" class="shell">
    {% include "partials/app.html" %}
  </section>
</main>

<div id="loading-indicator" class="loading-overlay htmx-indicator">
  <div class="spinner"></div>
  <div class="loading-text" data-default-text="分岐を生成中...">分岐を生成中...</div>
</div>

<script>
  document.body.addEventListener("htmx:beforeRequest", function (event) {
    const loadingText = document.querySelector("#loading-indicator .loading-text");
    if (!loadingText) return;
    const trigger = event.detail.elt;
    const customText = trigger && trigger.getAttribute("data-loading-text");
    loadingText.textContent = customText || loadingText.dataset.defaultText || "分岐を生成中...";
  });

  document.body.addEventListener("htmx:afterRequest", function () {
    const loadingText = document.querySelector("#loading-indicator .loading-text");
    if (!loadingText) return;
    loadingText.textContent = loadingText.dataset.defaultText || "分岐を生成中...";
  });

  document.body.addEventListener("click", async function (event) {
    const button = event.target.closest("[data-copy-story]");
    if (!button) return;

    const targetId = button.getAttribute("data-story-target");
    const source = targetId ? document.getElementById(targetId) : null;
    const status = document.getElementById("story-copy-status");
    const text = source ? source.textContent.trim() : "";

    if (!text) {
      if (status) status.textContent = "コピー対象がありません";
      return;
    }

    try {
      await navigator.clipboard.writeText(text);
      if (status) status.textContent = "コピーしました";
      window.setTimeout(function () {
        const latestStatus = document.getElementById("story-copy-status");
        if (latestStatus) latestStatus.textContent = "";
      }, 2000);
    } catch (_) {
      if (status) status.textContent = "コピーできませんでした";
    }
  });
</script>
{% endblock %}
