<div class="screen-body panel-tree">
  <div class="section-head">
    <div>
      <h2>ツリー表示</h2>
      <p>選択した分岐をツリー構造で確認できます。</p>
    </div>
    <div class="meta-row">
      <span class="pill">API: {{ state.provider|upper }}</span>
      <span class="pill">全ノード数: {{ tree_nodes|length }}</span>
    </div>
  </div>
  {% if profile %}
  <div class="summary-bar">
    <strong>{{ profile.name }}</strong>
    <span>{{ profile.current_age }}歳</span>
  </div>
  {% endif %}
  {% if tree_nodes %}
  <div class="tree-canvas-wrap">
    <svg
      class="tree-canvas"
      viewBox="0 0 {{ tree_view.width }} {{ tree_view.height }}"
      width="{{ tree_view.width }}"
      height="{{ tree_view.height }}"
      role="img"
      aria-label="人生分岐ツリー"
    >
      {% for edge in tree_view.edges %}
      <path
        d="M {{ edge.x1 }} {{ edge.y1 }} C {{ edge.x1 + 40 }} {{ edge.y1 }}, {{ edge.x2 - 40 }} {{ edge.y2 }}, {{ edge.x2 }} {{ edge.y2 }}"
        class="tree-edge {{ 'is-selected' if edge.selected else '' }}"
      />
      {% endfor %}

      {% for node in tree_view.nodes %}
      <g
        transform="translate({{ node.x }}, {{ node.y }})"
        hx-post="/tree/jump"
        hx-target="#app-shell"
        hx-swap="innerHTML"
        hx-vals='{"node_id": "{{ node.id }}"}'
        class="tree-node-group"
      >
        <rect
          width="{{ node.width }}"
          height="{{ node.height }}"
          rx="16"
          class="tree-node-box {{ 'is-selected' if node.selected else '' }}"
        />
        <text x="16" y="24" class="tree-node-status">{{ node.status }}</text>
        <foreignObject x="16" y="34" width="{{ node.width - 32 }}" height="{{ node.height - 44 }}">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tree-node-title-wrap">
            <div class="tree-node-title">{{ node.title }}</div>
            <div class="tree-node-meta">{{ node.year }}年 / {{ node.age }}歳</div>
            {% if node.happiness %}
            <div class="tree-node-meta">幸福度: {{ node.happiness }}</div>
            {% endif %}
          </div>
        </foreignObject>
      </g>
      {% endfor %}
    </svg>
  </div>
  {% else %}
  <p class="hint">まだツリーは生成されていません。</p>
  {% endif %}
</div>
